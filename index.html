    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background-color: #ffffff;
      color: #333333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .header {
      width: 100%;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #f0f0f0;
    }
    .header svg { height: 32px; width: auto; }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .main h1 {
      font-size: 28px;
      font-weight: 500;
      color: #000000;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 16px;
    }
    .main p {
      font-size: 16px;
      font-weight: 300;
      color: #666666;
      line-height: 1.6;
      max-width: 420px;
    }
    .accent {
      width: 48px;
      height: 3px;
      background-color: #CF2E2E;
      border-radius: 2px;
      margin-bottom: 40px;
    }
    .footer {
      width: 100%;
      padding: 24px 40px;
      text-align: center;
      border-top: 1px solid #f0f0f0;
    }
    .footer p {
      font-size: 12px;
      font-weight: 400;
      color: #999999;
      letter-spacing: 0.02em;
    }
    @media (max-width: 576px) {
      .header { padding: 20px 24px; }
      .header svg { height: 26px; }
      .main h1 { font-size: 22px; }
      .main p { font-size: 15px; }
    }
  </style>
